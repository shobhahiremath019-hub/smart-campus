<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusHub Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Book any campus resource instantly.</h1>
    <p>Labs, classrooms, seminar halls, libraries — manage everything in one place.</p>

    <div class="stats">
      <div><h2>0</h2><p>Resources</p></div>
      <div><h2>0</h2><p>Bookings</p></div>
      <div><h2>0</h2><p>Uptime</p></div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h2>Welcome Back</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="login()">Sign In</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
